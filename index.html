<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level Up Day! 🚀✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --accent-pink: #ff2a75;
            --accent-cyan: #00f2fe;
            --accent-yellow: #f82200;
            --card-bg: rgba(18, 18, 28, 0.75);
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #09090e;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* Dynamic Animated Background Gradients */
        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,42,117,0.35) 0%, rgba(0,0,0,0) 70%);
            top: 10%;
            left: 15%;
            filter: blur(50px);
            animation: floatGlow 12s infinite alternate ease-in-out;
            z-index: 1;
        }

        .bg-glow-2 {
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(0,242,254,0.3) 0%, rgba(0,0,0,0) 70%);
            bottom: 10%;
            right: 15%;
            filter: blur(50px);
            animation: floatGlow 10s infinite alternate-reverse ease-in-out;
            z-index: 1;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.2); }
        }

        /* Glass Card */
        .card {
            position: relative;
            z-index: 10;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5),
                        0 0 40px rgba(255, 42, 117, 0.15);
            max-width: 90%;
            width: 420px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .level-badge {
            display: inline-block;
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-cyan));
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(255, 42, 117, 0.4);
        }

        h1 {
            font-size: 2.1rem;
            font-weight: 900;
            margin: 0 0 20px 0;
            line-height: 1.2;
            background: linear-gradient(180deg, #ffffff 0%, #d1d5db 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .media-box {
            height: 200px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .media-box img {
            max-height: 100%;
            max-width: 100%;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .interactive-zone {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            min-height: 60px;
            position: relative;
        }

        button {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            padding: 16px 24px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #actionBtn {
            background: linear-gradient(135deg, var(--accent-pink) 0%, #d63031 100%);
            color: white;
            z-index: 2;
        }

        #actionBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 42, 117, 0.6);
        }

        #evadeBtn {
            background: rgba(255, 255, 255, 0.1);
            color: #d1d5db;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100;
            transition: top 0.2s ease, left 0.2s ease, transform 0.2s;
        }

        /* Float/Pulse Effects */
        .pulse {
            animation: pulseGlow 1.5s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }
            100% { box-shadow: 0 0 30px rgba(0, 242, 254, 0.8); }
        }

        .wobble {
            animation: wobble 0.5s ease-in-out;
        }

        @keyframes wobble {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px) rotate(-3deg); }
            75% { transform: translateX(8px) rotate(3deg); }
        }

        .subtext {
            color: #9ca3af;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="card" id="card">
        <div class="level-badge" id="badge">STAGE 1: VERIFICATION</div>
        <h1 id="title">Claim your official Birthday Gift! 🎁</h1>
        
        <div class="media-box">
            <img id="displayImg" src="https://media.giphy.com/media/3o7527pa7qs9kCG78A/giphy.gif" alt="Waiting">
        </div>

        <div class="interactive-zone" id="btnContainer">
            <button id="actionBtn">CLAIM GIFT 🎁</button>
            <button id="evadeBtn">Not Today ✋</button>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const badge = document.getElementById('badge');
        const title = document.getElementById('title');
        const displayImg = document.getElementById('displayImg');
        const actionBtn = document.getElementById('actionBtn');
        const evadeBtn = document.getElementById('evadeBtn');

        let attempts = 0;
        let isEvading = false;

        const evadeLabels = [
            "Not Today ✋",
            "Too Slow! ⚡",
            "Missed Me! 😜",
            "Nice Try 🏃‍♂️",
            "Catch Me! 🚀",
            "Almost! 💨",
            "Okay Stop! 😂"
        ];

        const reactionGifs = [
            "https://media.giphy.com/media/26n6WywJyh39n1pBu/giphy.gif", // Cheeky
            "https://media.giphy.com/media/l0HlBO7eyXzSZkJri/giphy.gif", // Running away
            "https://media.giphy.com/media/d1E1msx7Yw5Ne1Fe/giphy.gif"  // Laughing
        ];

        // Move the "Evade" button away when targeted
        function dodgeButton() {
            if (!isEvading) return;

            evadeBtn.style.position = 'fixed';
            
            // Keep button within screen bounds
            const padding = 30;
            const maxX = window.innerWidth - evadeBtn.offsetWidth - padding;
            const maxY = window.innerHeight - evadeBtn.offsetHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            evadeBtn.style.left = randomX + 'px';
            evadeBtn.style.top = randomY + 'px';
        }

        // Handle clicking the evasive button
        function handleEvade() {
            attempts++;
            card.classList.remove('wobble');
            void card.offsetWidth; // Trigger reflow for animation
            card.classList.add('wobble');

            if (attempts < evadeLabels.length) {
                evadeBtn.innerText = evadeLabels[attempts];
            }

            if (attempts === 2) {
                displayImg.src = reactionGifs[0];
                badge.innerText = "STAGE 2: REFLEX TEST";
            }

            if (attempts === 4) {
                displayImg.src = reactionGifs[1];
            }

            // Scale up the main action button
            const scaleFactor = 1 + (attempts * 0.12);
            actionBtn.style.transform = `scale(${scaleFactor})`;

            // Enable full evasive mode after 3 clicks
            if (attempts >= 3) {
                isEvading = true;
                dodgeButton();
            }

            // Surrender after 7 attempts
            if (attempts >= 7) {
                isEvading = false;
                evadeBtn.style.position = 'relative';
                evadeBtn.style.left = 'auto';
                evadeBtn.style.top = 'auto';
                evadeBtn.innerText = "Fine, You Win! 🏆";
                displayImg.src = reactionGifs[2];
                badge.innerText = "FINAL STAGE: VICTORY";
            }
        }

        // Event Listeners for Evade Button
        evadeBtn.addEventListener('click', handleEvade);
        evadeBtn.addEventListener('mouseover', () => {
            if (isEvading) dodgeButton();
        });
        evadeBtn.addEventListener('touchstart', (e) => {
            if (isEvading) {
                e.preventDefault();
                dodgeButton();
            }
        }, {passive: false});

        // Handle Main Victory Click
        actionBtn.addEventListener('click', () => {
            // Explosive Confetti Sequence
            const duration = 3.5 * 1000;
            const animationEnd = Date.now() + duration;

            (function launchConfetti() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return;

                confetti({
                    particleCount: 7,
                    angle: 60,
                    spread: 60,
                    origin: { x: 0, y: 0.7 },
                    colors: ['#ff2a75', '#00f2fe', '#ffd700', '#ffffff']
                });
                confetti({
                    particleCount: 7,
                    angle: 120,
                    spread: 60,
                    origin: { x: 1, y: 0.7 },
                    colors: ['#ff2a75', '#00f2fe', '#ffd700', '#ffffff']
                });

                requestAnimationFrame(launchConfetti);
            })();

            // Transform Card to Birthday Wish
            card.innerHTML = `
                <div class="level-badge" style="background: linear-gradient(90deg, #ffd700, #ff2a75);">LEVEL UP UNLOCKED 🚀</div>
                <h1 style="font-size: 2.4rem; margin-top: 10px;">HAPPY BIRTHDAY! 🎉</h1>
                <div class="media-box" style="height: 220px;">
                    <img src="https://media.giphy.com/media/g5R9eccVG520w/giphy.gif" alt="Celebration!">
                </div>
                <div class="subtext">
                    You officially survived another trip around the sun! ☀️<br><br>
                    May your year ahead be packed with zero bugs, endless wins, and good vibes only! 🔥 ✨
                </div>
            `;

            // Elevate Card Style
            card.style.borderColor = "rgba(0, 242, 254, 0.5)";
            card.style.boxShadow = "0 0 50px rgba(0, 242, 254, 0.3)";
        });
    </script>
</body>
</html>
